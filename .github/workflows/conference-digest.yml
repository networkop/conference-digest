name: Conference Digest

on:
  schedule:
    # Every two weeks, Monday 08:00 UTC (cron has no native fortnightly;
    # this runs weekly and the state machine no-ops when nothing is new,
    # so effectively you only get issues when there's something to digest).
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      conference:
        description: 'Registry key to force (e.g. nsdi-2025). Leave blank for normal scan.'
        required: false
        default: ''

permissions:
  contents: write   # commit prompts/ and state.json
  issues: write     # open the "ready" issue

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git pull --rebase works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate prompts and update state
        id: generate
        run: |
          if [ -n "${{ github.event.inputs.conference }}" ]; then
            python scripts/generate_digest_prompt.py --conference "${{ github.event.inputs.conference }}"
          else
            python scripts/generate_digest_prompt.py
          fi

      - name: Commit prompts and state
        run: |
          git config user.name  "conference-digest-bot"
          git config user.email "actions@github.com"
          # run_summary.json is ephemeral (read by the issue step in this same
          # job) and intentionally NOT committed — committing it every run made
          # main churn and race with itself.
          git add prompts/ conferences/state.json
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "digest run: update prompts and state ($(date -u +%F))"
          # The remote may have advanced between checkout and now. Rebase onto
          # latest main and retry the push a few times before giving up.
          for attempt in 1 2 3; do
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt); rebasing onto origin/main"
            git fetch origin main
            git pull --rebase origin main
          done
          echo "push failed after retries" >&2
          exit 1

      - name: Build issue content
        if: steps.generate.outputs.notify == 'true'
        run: python scripts/build_issue.py

      - name: Open issues
        if: steps.generate.outputs.notify == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issues = JSON.parse(fs.readFileSync('issues.json', 'utf8'));
            for (const it of issues) {
              const confLabel = it.labels.find(l => l.startsWith('conf:'));
              // idempotency: skip if an OPEN issue with this conf label exists
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: confLabel,
              });
              if (existing.data.length > 0) {
                console.log(`skip ${it.key}: open issue #${existing.data[0].number} already exists`);
                continue;
              }
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: it.title,
                body: it.body,
                labels: it.labels,
              });
              console.log(`opened #${created.data.number} for ${it.key}`);
            }
